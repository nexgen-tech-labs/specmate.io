name: Deploy

# Single-environment for now: only production infra is deployed (see infra/README.md —
# staging was deliberately deferred, "decide and deploy later if required"). Production
# deploy requires manual approval via the `production` GitHub Environment (configure
# required reviewers in repo Settings > Environments).
#
# Auth uses OIDC federated credentials tied to an Azure Managed Identity — no client
# secret is stored in GitHub. Configure the federated credential on the identity to trust
# this repo + branch/environment (see infra/README.md).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: ${{ vars.ACR_NAME }}
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  CONTAINERAPPS_ENV: ${{ vars.CONTAINERAPPS_ENVIRONMENT }}
  KEY_VAULT_NAME: ${{ vars.KEY_VAULT_NAME }}

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC federated credential)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name "$ACR_NAME"

      - name: Build & push web image
        run: |
          docker build -t "$ACR_NAME.azurecr.io/specmate-web:${{ steps.tag.outputs.tag }}" -f apps/web/Dockerfile .
          docker push "$ACR_NAME.azurecr.io/specmate-web:${{ steps.tag.outputs.tag }}"

      - name: Build & push api image
        run: |
          docker build -t "$ACR_NAME.azurecr.io/specmate-api:${{ steps.tag.outputs.tag }}" -f apps/api/Dockerfile apps/api
          docker push "$ACR_NAME.azurecr.io/specmate-api:${{ steps.tag.outputs.tag }}"

  deploy-production:
    name: Deploy to production (manual approval gate)
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Azure login (OIDC federated credential)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile --filter=@specmate/web...

      # Schema before code: migrate the real production database ahead of
      # swapping in the new image, so a newly-deployed revision never queries
      # a table/column that doesn't exist yet. DATABASE_URL is assembled from
      # Key Vault at deploy time (never stored as a GitHub secret) using the
      # same OIDC-authenticated identity that just logged in above.
      - name: Run Prisma migrations against production
        working-directory: apps/web
        run: |
          PG_PASSWORD=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name POSTGRES-ADMIN-PASSWORD --query value -o tsv)
          PG_HOST=$(az postgres flexible-server show --name specmate-pg --resource-group "$RESOURCE_GROUP" --query fullyQualifiedDomainName -o tsv)
          export DATABASE_URL="postgresql://specmateadmin:${PG_PASSWORD}@${PG_HOST}:5432/specmate?sslmode=require"
          npx prisma migrate deploy --schema prisma/schema.prisma

      - name: Deploy web to Container Apps (production)
        run: |
          az containerapp update \
            --name specmate-web \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_NAME.azurecr.io/specmate-web:${{ needs.build-and-push.outputs.image-tag }}"

      - name: Deploy api to Container Apps (production)
        run: |
          az containerapp update \
            --name specmate-api \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_NAME.azurecr.io/specmate-api:${{ needs.build-and-push.outputs.image-tag }}"
