name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web:
    name: Web (lint, typecheck, test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: specmate
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5434/specmate?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter=@specmate/web run prisma:generate

      - name: Run Prisma migrations
        run: pnpm --filter=@specmate/web exec prisma migrate deploy --schema prisma/schema.prisma

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  api:
    name: API (lint, typecheck, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: specmate
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5434/specmate
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: uv sync --all-extras

      - name: Set up Node (for Prisma migrations)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: Run Prisma migrations
        working-directory: apps/web
        run: |
          pnpm install --frozen-lockfile
          pnpm exec prisma migrate deploy --schema prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5434/specmate?schema=public

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Typecheck (mypy)
        run: uv run mypy app

      - name: Test (pytest)
        run: uv run pytest
